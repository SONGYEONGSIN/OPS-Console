name: service-notice-mail

on:
  # schedule 제거 — cron-job.org(매일 09:00 KST)가 호출. GitHub cron은 지연·누락이
  # 잦아 receivables와 동일하게 cron-job.org로 일원화. 수동 트리거만 유지.
  # 잡 내부에서 주말·공휴일 차단 + 월 단위 idempotency로 "이번 달 첫 영업일 1회"만 발송.
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trigger:
    name: POST /api/automations/run?jobId=service-notice-mail
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Trigger automation
        env:
          OPS_CONSOLE_BASE_URL: ${{ secrets.OPS_CONSOLE_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/service-notice-mail.mjs
