name: receivables-mail-operator

on:
  schedule:
    # 평일(월~금) 01:00 UTC = 한국 10:00 — 운영자 본인 미수채권 알림
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trigger:
    name: POST /api/automations/run?jobId=receivables-mail-operator
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Trigger automation
        env:
          OPS_CONSOLE_BASE_URL: ${{ secrets.OPS_CONSOLE_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/receivables-mail-operator.mjs
