name: insights-fetch

on:
  schedule:
    # 매일 23:00 UTC = 한국 08:00 — 출근 직전 적재
    - cron: "0 23 * * *"
  workflow_dispatch:

# 2026-06-02 Node.js 20 deprecation 대비 — actions(@v4)이 Node 24로 미리 동작하도록 강제.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trigger:
    name: POST /api/automations/run?jobId=insights-collect
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # feature 모듈 runInsightsCollect를 단일 실행 — 국내 한글 필터/blocklist/키워드가
      # UI '지금 실행'과 동일하게 적용된다. (구 insights-fetch.mjs 자체 구현은 제거됨)
      - name: Trigger automation
        env:
          OPS_CONSOLE_BASE_URL: ${{ secrets.OPS_CONSOLE_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/insights-collect.mjs
