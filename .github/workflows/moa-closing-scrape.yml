name: moa-closing-scrape

on:
  # 스케줄은 OPS-Console closing-scrape 자동화 잡이 GitHub workflow_dispatch API로 호출.
  #   cron-job.org → POST /api/automations/run?jobId=closing-scrape (Bearer CRON_SECRET)
  #                → closing-scrape.run() → GitHub workflow_dispatch (GITHUB_DISPATCH_TOKEN)
  # 실행 주기(주간/격주)는 본 워크플로의 스크래퍼가 판정한다(off주 exit 0). 현재 주간(매주).
  # GitHub UI에서 직접 실행해도 주기 게이트를 우회하지 않고 그대로 스크래퍼가 판정한다.
  workflow_dispatch:

# Node.js 20 deprecation 대비 — actions(@v4)이 Node 24로 동작하도록 강제.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    name: Moa 서비스조회 스크래핑 → closing 인제스트
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # 3.11 고정 — undetected-chromedriver가 distutils를 import하는데
          # Python 3.12는 distutils를 제거(PEP 632)해 ModuleNotFoundError 발생.
          python-version: "3.11"

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      # uc(undetected-chromedriver) + non-headless로 Cloudflare 회피 → 가상 디스플레이 필요.
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install Python deps
        run: pip install -r scripts/moa-closing/requirements.txt

      - name: Scrape Moa → POST /api/closing/ingest (격주 게이트는 스크래퍼가 판정)
        env:
          # Moa 로그인 — GitHub Actions Secrets
          MOA_USERNAME: ${{ secrets.MOA_USERNAME }}
          MOA_PASSWORD: ${{ secrets.MOA_PASSWORD }}
          # SMS 2FA 코드 회수 (make 웹훅 GET — 응답=SMS 본문)
          MAKE_SMS_CODE_URL: ${{ secrets.MAKE_SMS_CODE_URL }}
          # OPS-Console 인제스트
          OPS_CONSOLE_BASE_URL: ${{ secrets.OPS_CONSOLE_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # uc가 올바른 Chrome 바이너리/드라이버 버전을 쓰도록 setup-chrome 출력 전달
          # (미지정 시 uc가 최신 드라이버를 받아 Chrome 버전과 불일치).
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROME_VERSION: ${{ steps.setup-chrome.outputs.chrome-version }}
          # 동작 파라미터 (비밀 아님 — 기본값은 scrape.py에 내장, 필요 시 override)
          # Cloudflare 회피: uc + xvfb 가상 디스플레이에서 non-headless로 실행.
          HEADLESS_MODE: "false"
          CLOSING_BIWEEKLY_ANCHOR: "2026-06-08"
          MOA_SMS_POLL_TIMEOUT_SEC: "90"
          MOA_SMS_POLL_INTERVAL_SEC: "3"
          # CLOSING_DRY_RUN: "true"  # 추출만 하고 인제스트 미전송 (검증용)
        run: xvfb-run --auto-servernum python scripts/moa-closing/scrape.py

      # 로그인 폼 미등장 등 실패 시 진단용 — scrape.py가 저장한 fail-*.png/html 업로드.
      # (셀렉터 변경인지 차단/점검 페이지인지 artifact로 확인)
      - name: Upload failure dump
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: closing-fail-dump
          path: |
            fail-*.png
            fail-*.html
          if-no-files-found: ignore
          retention-days: 7
