name: receivables-deposit-match

on:
  # schedule 제거 — cron-job.org(매시 정각)가 호출. 중복 방지 위해 GitHub cron은 끄고
  # 수동 트리거(workflow_dispatch)만 유지. 실행은 자동화 메뉴 토글(enabled)로 게이트.
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trigger:
    name: POST /api/automations/run?jobId=receivables-deposit-match
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Trigger automation
        env:
          OPS_CONSOLE_BASE_URL: ${{ secrets.OPS_CONSOLE_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/receivables-deposit-match.mjs
